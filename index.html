<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:rgb(89, 255, 0);
    padding:30px;
}

h1{
    text-align:center;
    color:black;
    margin-bottom:20px;
}

.search-box{
    text-align:center;
    margin-bottom:30px;
}

.search-box input{
    width:300px;
    padding:10px;
    border:1px solid #cccccc;
    border-radius:5px;
}

.gallery{
    max-width:1000px;
    margin:auto;
    background:rgb(255, 255, 255);
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    border-radius:10px;
}

.gallery img{
    width:100%;
    height:170px;
    object-fit:cover;
    border-radius:5px;
    transition:0.4s;
    cursor:pointer;
}

.gallery img:hover{
    transform:scale(1.08);
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

</style>
