<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My first table</title>
</head>
<body>
    <table border="black">
        <caption><b>Food item </b></caption>
        
        <!--this is header-->
        <thead><tr>
            <th rowspan="2">Item</th>
            <th colspan="2">price</th>

        </tr>
        <tr>
            <th>INR</th>
            <th>USD</th>
        </tr>
    </thead>
        <tbody><tr>
            <td>apple</td>
            <td>60 </td>
            <td>0.67</td>
        </tr>
        <tr>
            <td>orang</td>
            <td>100 </td>
            <td>1.12</td>
        </tr>
        <tr>
            <td>grapes</td>
            <td>150 </td>
            <td>1.68</td>
        </tr>
    </table>
    </tbody>
</body>
</html>
